{% load static %}

<div x-data="{
    items: [
      {
        icon: 'icon-scroll-text',
        label: 'Stats',
        url: `{% url 'App:stat-list' %}`,
        match: 'equal'      // or 'includes'
      },
      {
        icon: 'icon-circle-fading-arrow-up',
        label: 'Latest',
        url: `{% url 'App:latest-stat' %}`,
        match: 'includes'
      },
      {% if request.user.is_authenticated %}{
        icon: 'icon-user-star',
        label: 'Facilitators',
        url: `{% url 'App:facilitator-list' %}`,
        match: 'includes'
      },{% endif %}
      {% if request.user.is_staff %}{
        icon: 'icon-chart-pie',
        label: 'Dashboard',
        url: `{% url 'dashboard:index' %}`,
        match: 'includes'
      },{% endif %}
      {
        icon: 'icon-badge-info',
        label: 'Info',
        url: `{% url 'App:info' %}`,
        match: 'includes'
      }
    ],
    isActive(url, match) {
      const path = '{{ request.path }}';
      return match === 'equal'
        ? path === url
        : path.includes(url);
    },
    init(){
        // Wait for Alpine to finish rendering the x-for loop DOM elements
        this.$nextTick(() => {
            const footer = this.$el;

            // 1. Measure height after the DOM has been populated by Alpine
            const footerHeight = footer.getBoundingClientRect().height;

            if (footerHeight === 0) return;

            // 2. Create spacer element and place it directly BEFORE the fixed footer
            const spacer = document.createElement('div');
            spacer.style.height = `${footerHeight}px`;
            spacer.className = 'footer-spacer';
            spacer.style.paddingBottom = `calc(${footerHeight}px + 1rem)`;
            // spacer.classList.add('')
            footer.parentNode.insertBefore(spacer, footer);
        });
    }
  }" class="fixed bottom-0 left-0 right-0 bg-ink-700">
    <div class="hidden  p-4 pb-16">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200.58 52">

        </svg>

        <p class="text-center mt-6">
            by <a class="font-bold" href="https://eliheist.pythonanywhere.com" target="_blank"><i class="fas fa-globe ml-2"></i> eliHeist</a>
        </p>
        
        <div class="grid justify-center py-4">
            {% if request.user.is_authenticated %}
            <a href="{% url 'logout' %}" class="text-white mx-auto"><i class="fas fa-lock mr-2 text-red"></i>Logout</a>
            {% else %}
            <a href="{% url 'login' %}" class="text-white mx-auto"><i class="fas fa-lock mr-2 text-red"></i>Login</a>
            {% endif %}
        </div>  
    </div>
    <!-- Mobile / Android-style bottom nav (visible on small screens only) -->
    <nav class="max-w-4xl mx-auto" role="navigation" aria-label="Bottom navigation">
        <div class="flex justify-around text-xl">
            <template x-for="item in items" :key="item.url">
                <a :href="item.url" class="flex-1">
                    <div class="flex flex-col items-center py-2 text-white"
                        :class="isActive(item.url, item.match) ? 'opacity-100' : 'opacity-60'"
                    >
                        <span :class="item.icon"></span>
                        <span class="text-xs" x-text="item.label"></span>
                    </div>
                </a>
            </template>
        </div>
    </nav>
</div>
